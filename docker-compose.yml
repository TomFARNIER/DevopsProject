services:
  # Ce fichier repose sur des variables d'environnement (.env).
  # Exemples: MY_EMAIL, DOZZLE_DOMAIN, N8N_DOMAIN, WORDPRESS_DOMAIN, ZABBIX_DOMAIN,
  # WP_DB_*, ZBX_DB_*. Cela évite d'exposer des secrets en dur.

  # --- REVERSE PROXY ---
  proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    labels:
      - "com.github.nginx-proxy.nginx"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Lecture du socket Docker: permet d'auto-detecter les conteneurs a exposer.
      - /var/run/docker.sock:/tmp/docker.sock:ro
      # Certificats, conf vhost et challenge ACME partages avec le companion SSL.
      - ./data/proxy/certs:/etc/nginx/certs:ro
      - ./data/proxy/vhost:/etc/nginx/vhost.d:ro
      - ./data/proxy/html:/usr/share/nginx/html:ro
    networks:
      - public
    restart: always

  # --- SSL COMPANION ---
  ssl-helper:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    environment:
      - TRUST_DOWNSTREAM_PROXY=true
      # Nom exact du conteneur nginx-proxy que ce service doit piloter.
      - NGINX_PROXY_CONTAINER=nginx-proxy
      # Email utilise lors de l'emission/renouvellement Let's Encrypt.
      - DEFAULT_EMAIL=${MY_EMAIL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Doit rester en rw pour ecrire les certificats et challenges.
      - ./data/proxy/certs:/etc/nginx/certs:rw
      - ./data/proxy/vhost:/etc/nginx/vhost.d:rw
      - ./data/proxy/html:/usr/share/nginx/html:rw
      - ./data/proxy/acme:/etc/acme.sh
    networks:
      - public
    depends_on:
      - proxy
    restart: always

  # --- DOZZLE (LOGS) ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    environment:
      # Trio attendu par nginx-proxy + acme-companion pour publier en HTTPS.
      - VIRTUAL_HOST=${DOZZLE_DOMAIN}
      - LETSENCRYPT_HOST=${DOZZLE_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      # Port interne de Dozzle cible par le reverse proxy.
      - VIRTUAL_PORT=8080
      - DOZZLE_ENABLE_ACTIONS=true
      - DOZZLE_AUTH_PROVIDER=simple
    volumes:
      # Necessaire pour lire les logs des autres conteneurs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Fichier d'authentification locale Dozzle.
      - ./data/dozzle/users.yml:/data/users.yml:ro
    networks:
      - public
    restart: always

  # --- N8N ---
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    environment:
      - VIRTUAL_HOST=${N8N_DOMAIN}
      - LETSENCRYPT_HOST=${N8N_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      - VIRTUAL_PORT=5678
    volumes:
      # Persistance des workflows, credentials et configuration n8n.
      - ./data/n8n:/home/node/.n8n
    networks:
      - public
    restart: always

  # --- WORDPRESS ---
  wordpress:
    image: wordpress:latest
    container_name: wordpress
    environment:
      - VIRTUAL_HOST=${WORDPRESS_DOMAIN}
      - LETSENCRYPT_HOST=${WORDPRESS_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      # Connexion a la base WordPress (service db-wp sur reseau prive net-wp-db).
      - WORDPRESS_DB_HOST=${WP_DB_HOST}:${WP_DB_PORT}
      - WORDPRESS_DB_USER=${WP_DB_USER}
      - WORDPRESS_DB_PASSWORD=${WP_DB_PASSWORD}
      - WORDPRESS_DB_NAME=${WP_DB_NAME}
    volumes:
      # Persistance des themes/plugins/uploads et du core WordPress.
      - ./data/wp:/var/www/html
    depends_on:
      db-wp:
        # Attend que MySQL reponde avant de lancer WordPress.
        condition: service_healthy
    networks:
      - public
      - net-wp-db
    restart: always

  db-wp:
    image: mysql:8.0
    container_name: db-wp
    # mysql_native_password facilite la compatibilite avec certains clients/plug-ins.
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_DATABASE=${WP_DB_NAME}
      - MYSQL_USER=${WP_DB_USER}
      - MYSQL_PASSWORD=${WP_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${WP_ROOT_PASSWORD}
    volumes:
      # Donnees MySQL WordPress persistantes.
      - ./data/db/wp:/var/lib/mysql
    networks:
      - net-wp-db
    healthcheck:
      # Verifie que MySQL accepte les connexions locales.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${WP_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # --- ZABBIX ---
  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-6.4-latest
    container_name: zabbix-web
    environment:
      - VIRTUAL_HOST=${ZABBIX_DOMAIN}
      - LETSENCRYPT_HOST=${ZABBIX_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      - VIRTUAL_PORT=8080
      # zabbix-web se connecte au serveur zabbix et a la base MySQL.
      - ZBX_SERVER_HOST=${ZBX_SERVER_HOST}
      - DB_SERVER_HOST=${ZBX_DB_HOST}
      - MYSQL_DATABASE=${ZBX_DB_NAME}
      - MYSQL_USER=${ZBX_DB_USER}
      - MYSQL_PASSWORD=${ZBX_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${ZBX_ROOT_PASSWORD}
    depends_on:
      db-zabbix:
        condition: service_healthy
      zabbix-server:
        # Le front Zabbix demarre une fois le serveur applicatif lance.
        condition: service_started
    networks:
      - public
      - net-zabbix-db
    restart: always

  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-6.4-latest
    container_name: zabbix-server
    environment:
      # Service applicatif Zabbix relie a MySQL.
      - DB_SERVER_HOST=${ZBX_DB_HOST}
      - MYSQL_DATABASE=${ZBX_DB_NAME}
      - MYSQL_USER=${ZBX_DB_USER}
      - MYSQL_PASSWORD=${ZBX_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${ZBX_ROOT_PASSWORD}
    depends_on:
      db-zabbix:
        condition: service_healthy
    networks:
      - public
      - net-zabbix-db
    restart: always

  db-zabbix:
    image: mysql:8.0
    container_name: db-zabbix
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_DATABASE=${ZBX_DB_NAME}
      - MYSQL_USER=${ZBX_DB_USER}
      - MYSQL_PASSWORD=${ZBX_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${ZBX_ROOT_PASSWORD}
    volumes:
      # Donnees MySQL Zabbix persistantes.
      - ./data/db/zabbix:/var/lib/mysql
    networks:
      - net-zabbix-db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${ZBX_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

networks:
  # Reseau public: expose les services web au reverse proxy.
  public:
    driver: bridge
  # Reseaux prives dedies aux bases de donnees.
  net-wp-db:
    driver: bridge
    internal: true
  net-zabbix-db:
    driver: bridge
    internal: true